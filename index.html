<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Roster</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 12px;
      min-height: 100vh;
    }

    #placeholder { color: #555; padding: 32px; text-align: center; }
    #app { display: none; }
    #app.visible { display: block; }

    /* ── Header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    #player-name   { font-size: 18px; font-weight: bold; color: #7eb8f7; }
    #last-updated  { font-size: 11px; color: #555; }
    #roster-summary { font-size: 11px; color: #666; margin-bottom: 10px; }

    /* ── Controls ── */
    #controls { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }

    #search {
      width: 100%;
      padding: 7px 10px;
      background: #16213e;
      border: 1px solid #2d2d4e;
      border-radius: 5px;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
    }
    #search:focus     { border-color: #7eb8f7; }
    #search::placeholder { color: #444; }

    /* ── Filter / sort rows ── */
    .control-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 24px;
    }
    .control-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      min-width: 36px;
      flex-shrink: 0;
    }

    /* shared pill style for both filter and sort buttons */
    .pill {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #2d2d4e;
      background: #16213e;
      color: #888;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      user-select: none;
    }
    .pill:hover  { border-color: #7eb8f7; color: #ccc; }
    .pill.active { background: #2d6a9f; border-color: #7eb8f7; color: #fff; }

    .clear-btn {
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid transparent;
      background: transparent;
      color: #555;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.12s;
    }
    .clear-btn:hover { color: #aaa; }

    .loading-hint { font-size: 11px; color: #444; font-style: italic; }

    /* ── Cards ── */
    #roster {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 8px;
    }
    .card {
      background: #16213e;
      border: 1px solid #2d2d4e;
      border-radius: 6px;
      padding: 10px;
    }
    .card.paragon { border-color: #c8961a; }
    .card-name {
      font-weight: bold;
      font-size: 13px;
      color: #fff;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card.paragon .card-name { color: #f0c040; }

    .card-role {
      display: inline-block;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 10px;
      margin-bottom: 5px;
      font-weight: bold;
      text-transform: capitalize;
    }
    .card-role.mage      { background: #2d1f5e; color: #b39ddb; }
    .card-role.marksman  { background: #1a3d2b; color: #80cbc4; }
    .card-role.support   { background: #1a2f4a; color: #81d4fa; }
    .card-role.tank      { background: #3d2b1a; color: #ffcc80; }
    .card-role.warrior   { background: #3d1a1a; color: #ef9a9a; }
    .card-role.rogue     { background: #252525; color: #b0bec5; }

    .card-row { font-size: 11px; color: #888; margin-bottom: 2px; }
    .card-row span { color: #7eb8f7; font-weight: bold; }

    #no-results { color: #444; text-align: center; padding: 24px; display: none; }
  </style>
</head>
<body>

  <p id="placeholder">Select a player to view their roster.</p>

  <div id="app">
    <div id="header">
      <div id="player-name"></div>
      <div id="last-updated"></div>
    </div>
    <div id="roster-summary"></div>

    <div id="controls">
      <input id="search" type="text" placeholder="Search characters\u2026">

      <div class="control-row">
        <span class="control-label">Sort</span>
        <div id="sort-controls" style="display:contents"></div>
      </div>

      <div class="control-row">
        <span class="control-label">Faction</span>
        <div id="faction-filters" style="display:contents">
          <span class="loading-hint">loading\u2026</span>
        </div>
      </div>

      <div class="control-row">
        <span class="control-label">Role</span>
        <div id="role-filters" style="display:contents"></div>
      </div>
    </div>

    <div id="roster">
      <p id="no-results">No characters match your search.</p>
    </div>
  </div>

  <script>
    // ── Configuration ─────────────────────────────────────────────────────────
    // Adjust these to match your Grist column IDs if they differ.
    const CHARACTERS_TABLE       = 'Characters';
    const CHARACTERS_NAME_COL    = 'character_name';
    const CHARACTERS_ROLE_COL    = 'role';
    const CHARACTERS_FACTION_COL = 'faction';

    const ROLES = ['mage','marksman','support','tank','warrior','rogue'];

    // Defines the sort order for ascension levels — extend if new tiers are added.
    const ASCENSION_ORDER = {
      'epic':0, 'epic+':1, 'legendary':2, 'legendary+':3,
      'mythic':4, 'mythic+':5, 'supreme':6, 'supreme+':7,
      'paragon 1':8, 'paragon 2':9, 'paragon 3':10, 'paragon 4':11
    };

    const SORT_OPTIONS = [
      { value:'ascension', label:'Ascension' },
      { value:'name',      label:'Name A\u2192Z' },
      { value:'equipment', label:'Equipment' },
    ];

    // ── State ─────────────────────────────────────────────────────────────────
    let fullRoster           = [];
    let characterMeta        = {};   // { "Aether": { role: "mage", faction: "light" } }
    let activeFactionFilters = new Set();
    let activeRoleFilters    = new Set();
    let searchTerm           = '';
    let sortMode             = 'ascension';
    let lastMapped           = null;

    // ── Grist setup ───────────────────────────────────────────────────────────
    grist.ready({
      requiredAccess: 'read table',
      columns: [
        { name:'player_name',  title:'Player Name',  type:'Text'     },
        { name:'roster',       title:'Roster JSON',  type:'Text'     },
        { name:'last_updated', title:'Last Updated', type:'DateTime' },
      ]
    });

    grist.onRecord(function(record, mappings) {
      const mapped = mappings ? grist.mapColumnNames(record, mappings) : record;
      lastMapped = mapped;

      try   { fullRoster = JSON.parse(mapped.roster || '[]'); }
      catch { fullRoster = []; }

      // Reset interactive state on player change
      searchTerm = '';
      activeFactionFilters.clear();
      activeRoleFilters.clear();
      document.getElementById('search').value = '';
      sortMode = 'ascension';
      syncAllButtons();

      document.getElementById('player-name').textContent =
        mapped.player_name || '(no name)';

      const dateStr = formatDate(mapped.last_updated);
      document.getElementById('last-updated').textContent =
        dateStr ? 'Updated ' + dateStr : '';

      const hasData = fullRoster.length > 0;
      document.getElementById('placeholder').style.display = hasData ? 'none' : 'block';
      document.getElementById('placeholder').textContent   = 'No roster data for this player.';
      document.getElementById('app').classList.toggle('visible', hasData);

      renderRoster();
    });

    // ── Character metadata (role + faction from Grist Characters table) ───────
    async function loadCharacterMeta() {
      try {
        const table   = await grist.docApi.fetchTable(CHARACTERS_TABLE);
        const names   = table[CHARACTERS_NAME_COL]    || [];
        const roles   = table[CHARACTERS_ROLE_COL]    || [];
        const factions = table[CHARACTERS_FACTION_COL] || [];

        characterMeta = {};
        for (let i = 0; i < names.length; i++) {
          if (names[i]) {
            characterMeta[String(names[i])] = {
              role:    String(roles[i]    || '').toLowerCase().trim(),
              faction: String(factions[i] || '').toLowerCase().trim(),
            };
          }
        }
        buildFactionButtons();
        if (lastMapped) renderRoster();
      } catch(e) {
        document.getElementById('faction-filters').innerHTML =
          '<span class="loading-hint">Characters table not found \u2014 check config</span>';
        console.warn('Could not load Characters table:', e.message);
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function getMeta(name, key) {
      return (characterMeta[name] && characterMeta[name][key]) || '';
    }

    function isParagon(ascension) {
      return (ascension || '').toLowerCase().startsWith('paragon');
    }

    function formatDate(value) {
      if (!value) return null;
      const d = typeof value === 'number' ? new Date(value * 1000) : new Date(value);
      if (isNaN(d.getTime())) return String(value);
      return d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    // ── Sorting ───────────────────────────────────────────────────────────────
    function sortedRoster(roster) {
      return [...roster].sort((a, b) => {
        if (sortMode === 'name') {
          return (a.name || '').localeCompare(b.name || '');
        }
        if (sortMode === 'equipment') {
          return (b.equipment || 0) - (a.equipment || 0);
        }
        // Ascension: highest tier first; unknown ascensions go to the bottom
        const ai = ASCENSION_ORDER[(a.ascension || '').toLowerCase()] ?? -1;
        const bi = ASCENSION_ORDER[(b.ascension || '').toLowerCase()] ?? -1;
        return bi - ai;
      });
    }

    // ── Button builders ───────────────────────────────────────────────────────
    function buildSortButtons() {
      const container = document.getElementById('sort-controls');
      SORT_OPTIONS.forEach(opt => {
        const btn = document.createElement('button');
        btn.className      = 'pill';
        btn.dataset.sort   = opt.value;
        btn.textContent    = opt.label;
        if (opt.value === sortMode) btn.classList.add('active');
        btn.addEventListener('click', () => {
          sortMode = opt.value;
          syncAllButtons();
          renderRoster();
        });
        container.appendChild(btn);
      });
    }

    function buildFactionButtons() {
      const container = document.getElementById('faction-filters');
      container.innerHTML = '';

      // Derive unique faction names from loaded metadata, sorted alphabetically
      const factions = [...new Set(
        Object.values(characterMeta).map(m => m.faction).filter(Boolean)
      )].sort();

      if (factions.length === 0) {
        container.innerHTML = '<span class="loading-hint">no faction data in Characters table</span>';
        return;
      }

      factions.forEach(faction =>
        container.appendChild(makeFilterBtn(faction, capitalize(faction), activeFactionFilters, 'faction'))
      );
      container.appendChild(makeClearBtn(activeFactionFilters, 'faction'));
    }

    function buildRoleButtons() {
      const container = document.getElementById('role-filters');
      ROLES.forEach(role =>
        container.appendChild(makeFilterBtn(role, capitalize(role), activeRoleFilters, 'role'))
      );
      container.appendChild(makeClearBtn(activeRoleFilters, 'role'));
    }

    function makeFilterBtn(value, label, activeSet, groupId) {
      const btn = document.createElement('button');
      btn.className      = 'pill';
      btn.dataset.value  = value;
      btn.dataset.group  = groupId;
      btn.textContent    = label;
      btn.addEventListener('click', () => {
        if (activeSet.has(value)) activeSet.delete(value);
        else                      activeSet.add(value);
        syncAllButtons();
        renderRoster();
      });
      return btn;
    }

    function makeClearBtn(activeSet, groupId) {
      const btn = document.createElement('button');
      btn.className      = 'clear-btn';
      btn.dataset.clear  = groupId;
      btn.textContent    = '\u2715 clear';
      btn.style.display  = 'none';
      btn.addEventListener('click', () => {
        activeSet.clear();
        syncAllButtons();
        renderRoster();
      });
      return btn;
    }

    function syncAllButtons() {
      // Sort buttons
      document.querySelectorAll('[data-sort]').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.sort === sortMode)
      );
      // Faction filter buttons + clear
      document.querySelectorAll('[data-group="faction"]').forEach(btn =>
        btn.classList.toggle('active', activeFactionFilters.has(btn.dataset.value))
      );
      const factionClear = document.querySelector('[data-clear="faction"]');
      if (factionClear) factionClear.style.display =
        activeFactionFilters.size > 0 ? 'inline-block' : 'none';
      // Role filter buttons + clear
      document.querySelectorAll('[data-group="role"]').forEach(btn =>
        btn.classList.toggle('active', activeRoleFilters.has(btn.dataset.value))
      );
      const roleClear = document.querySelector('[data-clear="role"]');
      if (roleClear) roleClear.style.display =
        activeRoleFilters.size > 0 ? 'inline-block' : 'none';
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderRoster() {
      const rosterEl  = document.getElementById('roster');
      const summaryEl = document.getElementById('roster-summary');
      const noResults = document.getElementById('no-results');

      const filtered = sortedRoster(fullRoster).filter(char => {
        const nameMatch    = (char.name || '').toLowerCase().includes(searchTerm);
        const factionMatch = activeFactionFilters.size === 0 ||
                             activeFactionFilters.has(getMeta(char.name, 'faction'));
        const roleMatch    = activeRoleFilters.size === 0 ||
                             activeRoleFilters.has(getMeta(char.name, 'role'));
        return nameMatch && factionMatch && roleMatch;
      });

      const filterActive = activeFactionFilters.size > 0 || activeRoleFilters.size > 0 || searchTerm;
      summaryEl.textContent = filterActive
        ? filtered.length + ' of ' + fullRoster.length + ' characters'
        : fullRoster.length + ' character' + (fullRoster.length !== 1 ? 's' : '');

      Array.from(rosterEl.children).forEach(c => { if (c.id !== 'no-results') c.remove(); });

      if (filtered.length === 0) { noResults.style.display = 'block'; return; }
      noResults.style.display = 'none';

      filtered.forEach(char => {
        const role = getMeta(char.name, 'role');
        const card = document.createElement('div');
        card.className = 'card' + (isParagon(char.ascension) ? ' paragon' : '');
        card.innerHTML =
          '<div class="card-name">' + (char.name || '\u2014') + '</div>' +
          (role ? '<div class="card-role ' + role + '">' + role + '</div>' : '') +
          '<div class="card-row">Ascension: <span>' + (char.ascension || '\u2014') + '</span></div>' +
          '<div class="card-row">Equipment: <span>' + (char.equipment ?? '\u2014') + '</span></div>';
        rosterEl.appendChild(card);
      });
    }

    // ── Search ────────────────────────────────────────────────────────────────
    document.getElementById('search').addEventListener('input', function() {
      searchTerm = this.value.toLowerCase().trim();
      renderRoster();
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    buildSortButtons();
    buildRoleButtons();
    loadCharacterMeta();   // also calls buildFactionButtons() once data arrives
  </script>

</body>
</html>
